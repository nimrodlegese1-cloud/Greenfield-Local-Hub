<!DOCTYPE html>
<html>
    <head>
        <title>Greenfield Local Hub</title>
        <link rel="icon" href="{{ url_for('static', filename='Logo.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
    <div class="login-page">
        <!---------------Main Body Design-------------->
        <!--Background image -->
        <div class="shape rect background"></div>

        <!--header -->
        <div class="shape rect header"></div>

        <!--footer -->
        <div class="shape rect footer"></div>

        <!--Logo Part -->
        <div class="shape rect logo-part"></div>

        <!--Logo -->
        <a href="{{ url_for('homepage') }}">
            <div class="shape rect logo"></div>
        </a>

        <!--Header options-->
        <div class="top-button">
            <a href="{{ url_for('products') }}" class="link-buttons">Products</a>
            <a href="{{ url_for('basket') }}" class="link-buttons">Basket</a>

            <div class="left-buttons">
                <a href="{{ url_for('traceability') }}" class="link-buttons traceability-link">
                    <span class="text">Traceability</span>
                    <div class="header-icon">
                        <img src="{{ url_for('static', filename='Traceability.png') }}" class="traceability">
                    </div>
                </a>

                <a href="{{ url_for('contactus') }}" class="link-buttons contactus-link">
                    <span class="text">Contact Us</span>
                    <div class="header-icon">
                        <img src="{{ url_for('static', filename='contactus.png') }}" class="contactus">
                    </div>
                </a>
                <a href="#" class="link-buttons login-link" onclick="handleAccountClick(event)">
                        <span class="bottom-text">Account</span>
                        <span class="text">Sign in/up</span>
                        <div class="header-icon">
                            <img src="{{ url_for('static', filename='account.png') }}" class="login">
                        </div>
                </a>
                <button id="logoutBtn" onclick="logoutUser()" style="display:none;">Logout</button>
            </div>
        </div>

        <!--Middle of Page -->
        <div class="login-box">
            <div class="login-title">Login</div>

            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">

            <button class="login-btn" type="button" onclick="loginUser()">Login</button>
            <button class="register-btn" type="button" onclick="toggleRegister()">Register</button>

            <div id="registerBox" style="display: none; margin-top: 20px;">
                <h2>Register</h2>
                <input type="text" id="registerUsername" placeholder="New Username">
                <input type="password" id="registerPassword" placeholder="New Password">
                <button class="Submit" type="button" onclick="registerUser()">Submit Registration</button>
            </div>

            <a href="#" id="adminUsersOption" onclick="viewUsers()" style="display: none;">View Users</a>
        </div>

        <!--Footer options-->
        <div class="Bottom-button">
            <a href="{{ url_for('homepage') }}">
                <div class="shape rect bottom-logo-part"></div>
                <div class="shape rect bottom-logo"></div>
            </a>

            <!------Footer navigational section------>
            <div class="footer-navigations">
                <a href="{{ url_for('homepage') }}" class="link-buttons">
                    <span>Home</span>
                </a>
                <a href="{{ url_for('contactus') }}" class="link-buttons">
                    <span>About Us</span>
                </a>
                <a href="{{ url_for('traceability') }}" class="link-buttons">
                    <span>Book Events</span>
                </a>
                <a href="{{ url_for('traceability') }}" class="link-buttons">
                    <span>Search the map</span>
                </a>
                <a href="{{ url_for('investors') }}" class="link-buttons">
                    <span>Investors</span>
                </a>
            </div>

            <!--Follow us and contact links-->
            <div class="middle-bottom-button Follow-us">
                <div class="bottom-contact-su ">
                    <span>Contact Us</span>
                </div>
                <div class="bottom-contact-su email">
                     <a href="{{ url_for('contactus') }}" class="link-buttons">
                        <span>greenfield@localhub.com</span>
                    </a>
                </div>
                <div class="bottom-follow-su ">
                    <span>Follow Us</span>
                </div>

                <div class="social-links">
                    <a href="https://x.com/" class="link-buttons Twitter-link">
                        <div class="footer-icon">
                            <img src="{{ url_for('static', filename='Twitter.png') }}" class="Twitter">
                        </div>
                    </a>

                    <a href="https://www.instagram.com/" class="link-buttons instagram-link">
                        <div class="footer-icon">
                            <img src="{{ url_for('static', filename='Instagram.png') }}" class="instagram">
                        </div>
                    </a>
                </div>
            </div>

            <!--Legal clarifications-->
            <div class="left-bottons-Bottom">
                <div class="Legal">Legal</div>
                <a href="https://www.unitedfarmers.co.uk/privacy-policy" class="link-buttons">
                    <span>Privacy-Policy</span>
                </a>
                <a href="https://farmercopleys.co.uk/cookie-policy/" class="link-buttons">
                    <span>Cookie Policy</span>
                </a>
                <a href="https://www.forfarmers.co.uk/terms-conditions" class="link-buttons">
                    <span>Terms and conditions</span>
                </a>
            </div>
        </div>

        <script src="{{ url_for('static', filename='script.js') }}"></script>
        
    </div>
    </body>
</html>
